<link rel="stylesheet" href="style.css">
<div class="fit-form">
    <h2>Your Measurements</h2>

    <label for="height">Height (cm)</label>
    <input type="number" id="height" name="height" placeholder="e.g., 160">

    <label for="weight">Weight (kg)</label>
    <input type="number" id="weight" name="weight" placeholder="e.g., 50">

    <label for="bust">Bust (cm)</label>
    <input type="number" id="bust" name="bust" placeholder="e.g., 82">

    <label for="waist">Waist (cm)</label>
    <input type="number" id="waist" name="waist" placeholder="e.g., 60">

    <label for="hip">Hip (cm)</label>
    <input type="number" id="hip" name="hip" placeholder="e.g., 88">

    <label for="shoulder">Shoulder Width (cm)</label>
    <input type="number" id="shoulder" name="shoulder" placeholder="e.g., 38">

    <label for="sleeve">Sleeve Length (cm)</label>
    <input type="number" id="sleeve" name="sleeve" placeholder="e.g., 58">

    <button id="save-btn">Save</button>
</div>
